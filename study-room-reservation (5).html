<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STUDIUM — 自習室予約</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Noto+Sans+JP:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  window._firebaseModules = { initializeApp, getDatabase, ref, set, onValue };
</script>

<style>
:root {
  --bg:       #fafaf8;
  --bg2:      #f4f3ef;
  --surface:  #ffffff;
  --surface2: #f9f8f5;
  --border:   #e8e4dc;
  --border2:  #d4cfc4;

  --gold:     #b8860b;
  --gold-lt:  #d4a017;
  --gold-dk:  #8b6508;
  --gold-dim: rgba(184,134,11,0.08);
  --gold-glow:0 4px 24px rgba(184,134,11,0.25);
  --gold-gsm: 0 2px 12px rgba(184,134,11,0.15);

  --danger:   #c0392b;
  --danger-lt:#e74c3c;
  --success:  #1a6b3c;
  --success-lt:#27ae60;

  --text:     #1a1814;
  --text-dim: #6b6560;
  --text-muted:#a09a92;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family:'Noto Sans JP',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}

/* Subtle grain texture */
body::before {
  content:'';
  position:fixed; inset:0; pointer-events:none; z-index:0;
  background:
    radial-gradient(ellipse 60% 40% at 80% 10%, rgba(184,134,11,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 10% 90%, rgba(184,134,11,0.04) 0%, transparent 50%);
}

/* Gold top bar */
body::after {
  content:'';
  position:fixed; top:0; left:0; right:0; height:3px; z-index:999;
  background:linear-gradient(90deg, transparent 0%, var(--gold-dk) 15%, var(--gold-lt) 50%, var(--gold-dk) 85%, transparent 100%);
}

.container { position:relative; z-index:1; max-width:1080px; margin:0 auto; padding:0 24px; }

/* ── HEADER ── */
header {
  border-bottom:1px solid var(--border);
  padding:20px 0;
  background:rgba(250,250,248,0.95);
  backdrop-filter:blur(16px);
  position:sticky; top:0; z-index:100;
}
.header-inner { display:flex; align-items:center; justify-content:space-between; max-width:1080px; margin:0 auto; padding:0 24px; }
.logo-wrap { display:flex; flex-direction:column; gap:1px; }
.logo {
  font-family:'Cormorant Garamond',serif;
  font-size:1.6rem; font-weight:600; letter-spacing:0.28em;
  background:linear-gradient(135deg,var(--gold-dk) 0%,var(--gold-lt) 50%,var(--gold-dk) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.logo-sub { font-family:'Space Mono',monospace; font-size:0.5rem; letter-spacing:0.38em; color:var(--text-muted); text-transform:uppercase; }
.header-right { display:flex; align-items:center; gap:14px; }
.sync-indicator { display:flex; align-items:center; gap:5px; font-family:'Space Mono',monospace; font-size:0.56rem; color:var(--text-muted); }
.sync-dot { width:5px; height:5px; border-radius:50%; background:var(--success-lt); animation:blink 2s infinite; }
@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
.sync-dot.syncing { background:var(--gold); animation:pulse-dot 1s infinite; }
@keyframes pulse-dot { 0%,100%{transform:scale(1);} 50%{transform:scale(0.6);} }
.header-time { font-family:'Space Mono',monospace; font-size:0.7rem; color:var(--text-dim); }
.header-nav { display:flex; gap:4px; }
.nav-btn {
  background:transparent; border:1px solid var(--border2);
  color:var(--text-dim); padding:7px 16px; border-radius:3px;
  font-family:'Space Mono',monospace; font-size:0.62rem; letter-spacing:0.1em;
  cursor:pointer; transition:all 0.2s; text-transform:uppercase;
}
.nav-btn:hover { border-color:var(--gold); color:var(--gold); }
.nav-btn.active { border-color:var(--gold); color:var(--gold); background:var(--gold-dim); }

/* ── LOADING ── */
.loading-overlay {
  position:fixed; inset:0; background:var(--bg); z-index:500;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px;
}
.loading-logo { font-family:'Cormorant Garamond',serif; font-size:2.2rem; letter-spacing:0.3em; font-weight:600;
  background:linear-gradient(135deg,var(--gold-dk),var(--gold-lt));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.loading-bar { width:140px; height:1px; background:var(--border2); position:relative; overflow:hidden; }
.loading-bar::after { content:''; position:absolute; left:-100%; top:0; width:100%; height:100%;
  background:linear-gradient(90deg,transparent,var(--gold-lt),transparent); animation:load 1.2s ease-in-out infinite; }
@keyframes load { to{left:200%;} }
.loading-sub { font-family:'Space Mono',monospace; font-size:0.58rem; color:var(--text-muted); letter-spacing:0.2em; }

main { padding:32px 0 80px; }

/* ── DATE BAR ── */
.date-bar {
  display:flex; align-items:center; gap:14px; margin-bottom:28px;
  flex-wrap:wrap; padding-bottom:20px; border-bottom:1px solid var(--border);
}
.date-label { font-family:'Space Mono',monospace; font-size:0.58rem; letter-spacing:0.16em; color:var(--gold-dk); text-transform:uppercase; }
.date-input {
  background:var(--surface); border:1px solid var(--border2); color:var(--text);
  padding:8px 12px; border-radius:3px; font-family:'Space Mono',monospace; font-size:0.76rem;
  outline:none; cursor:pointer; transition:all 0.2s;
}
.date-input:focus { border-color:var(--gold); box-shadow:var(--gold-gsm); }

/* Time slot filter chips */
.slot-filter-wrap { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.slot-filter-chip {
  display:inline-flex; align-items:center; padding:5px 10px;
  border:1px solid var(--border2); border-radius:20px;
  font-family:'Space Mono',monospace; font-size:0.6rem; color:var(--text-dim);
  cursor:pointer; transition:all 0.2s; user-select:none; gap:4px;
}
.slot-filter-chip:hover { border-color:var(--gold-dk); color:var(--gold-dk); }
.slot-filter-chip.active { border-color:var(--gold); color:var(--gold); background:var(--gold-dim); }
.slot-filter-chip input { display:none; }

/* ── STATS ── */
.stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:28px; }
.stat-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:6px; padding:16px; position:relative; overflow:hidden;
  transition:transform 0.2s, box-shadow 0.2s;
}
.stat-card:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,0.06); }
.stat-card::after { content:''; position:absolute; bottom:0; left:0; right:0; height:2px; opacity:0; transition:opacity 0.2s; }
.stat-card:hover::after { opacity:1; }
.stat-card.s-open::after { background:linear-gradient(90deg,transparent,var(--gold),transparent); }
.stat-card.s-rsv::after  { background:linear-gradient(90deg,transparent,#7c5cbf,transparent); }
.stat-card.s-ok::after   { background:linear-gradient(90deg,transparent,var(--success-lt),transparent); }
.stat-card.s-ng::after   { background:linear-gradient(90deg,transparent,var(--danger-lt),transparent); }
.stat-num { font-family:'Cormorant Garamond',serif; font-size:2.6rem; font-weight:700; line-height:1; }
.stat-num.gold   { color:var(--gold); }
.stat-num.purple { color:#7c5cbf; }
.stat-num.green  { color:var(--success-lt); }
.stat-num.red    { color:var(--danger-lt); }
.stat-label { font-size:0.66rem; color:var(--text-muted); margin-top:4px; }

/* ── SECTION TITLE ── */
.section-title {
  font-family:'Space Mono',monospace; font-size:0.58rem; letter-spacing:0.2em;
  color:var(--gold-dk); text-transform:uppercase; margin-bottom:14px;
  display:flex; align-items:center; gap:10px;
}
.section-title::before { content:''; width:18px; height:1px; background:var(--gold-dk); }
.section-title::after  { content:''; flex:1; height:1px; background:var(--border); }

/* ── LEGEND ── */
.legend { display:flex; gap:20px; margin-bottom:18px; flex-wrap:wrap; }
.legend-item { display:flex; align-items:center; gap:7px; font-size:0.7rem; color:var(--text-dim); }
.legend-dot { width:8px; height:8px; border-radius:2px; }
.ld-empty    { background:var(--border2); }
.ld-partial  { background:rgba(184,134,11,0.3); }
.ld-reserved { background:#7c5cbf; }
.ld-present  { background:var(--success); }
.ld-noshow   { background:var(--danger); }

/* ── SEATS ── */
.seats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:32px; }
.seat-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:8px; padding:16px 13px 13px;
  cursor:pointer; transition:all 0.22s; position:relative; overflow:hidden; user-select:none;
}
.seat-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; opacity:0; transition:opacity 0.2s; }
.seat-card.empty::before { background:linear-gradient(90deg,transparent,var(--gold-lt),transparent); }
.seat-card.empty:hover { border-color:var(--gold-dk); box-shadow:0 4px 16px rgba(184,134,11,0.12); }
.seat-card.empty:hover::before { opacity:1; }
.seat-card.empty.partial { border-color:rgba(184,134,11,0.3); }
.seat-card.reserved { border-color:#c4b8e0; background:linear-gradient(135deg,#fff,rgba(124,92,191,0.04)); cursor:pointer; }
.seat-card.reserved::before { background:linear-gradient(90deg,transparent,#7c5cbf,transparent); opacity:0.4; }
.seat-card.present-seat { border-color:#b8dcc8; background:linear-gradient(135deg,#fff,rgba(26,107,60,0.04)); cursor:pointer; }
.seat-card.present-seat::before { background:linear-gradient(90deg,transparent,var(--success-lt),transparent); opacity:0.4; }
.seat-card.no-show { border-color:#f0c8c4; background:linear-gradient(135deg,#fff,rgba(192,57,43,0.04)); cursor:pointer; }
.seat-card.no-show::before { background:linear-gradient(90deg,transparent,var(--danger-lt),transparent); opacity:0.4; }
.seat-num { font-family:'Space Mono',monospace; font-size:0.54rem; color:var(--text-muted); letter-spacing:0.1em; margin-bottom:8px; }
.seat-icon { font-size:1.1rem; margin-bottom:5px; display:block; }
.seat-name { font-size:0.8rem; font-weight:500; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.seat-time { font-family:'Space Mono',monospace; font-size:0.56rem; color:var(--text-dim); margin-top:3px; }
.seat-memo { font-size:0.64rem; color:var(--gold-dk); margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-style:italic; }
.seat-comment { font-size:0.62rem; color:var(--text-dim); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.seat-badge {
  position:absolute; top:9px; right:9px;
  font-family:'Space Mono',monospace; font-size:0.5rem;
  padding:2px 6px; border-radius:2px; letter-spacing:0.08em; text-transform:uppercase;
}
.seat-card.empty    .seat-badge { background:rgba(184,134,11,0.1); color:var(--gold-dk); }
.seat-card.reserved .seat-badge { background:rgba(124,92,191,0.1); color:#7c5cbf; }
.seat-card.present-seat .seat-badge { background:rgba(26,107,60,0.1); color:var(--success); }
.seat-card.no-show  .seat-badge { background:rgba(192,57,43,0.1); color:var(--danger); }

/* ── ALERTS ── */
.noshow-alert {
  background:linear-gradient(90deg,rgba(192,57,43,0.06),rgba(192,57,43,0.02));
  border:1px solid rgba(192,57,43,0.2); border-left:3px solid var(--danger-lt);
  border-radius:4px; padding:11px 16px; margin-bottom:20px;
  display:flex; align-items:center; gap:12px; font-size:0.8rem;
}

/* ── MEMBER BANNER ── */
.bulk-banner {
  background:linear-gradient(90deg,rgba(184,134,11,0.06),rgba(184,134,11,0.02));
  border:1px solid rgba(184,134,11,0.25); border-left:3px solid var(--gold);
  border-radius:4px; padding:11px 16px; margin-bottom:20px;
  display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;
}
.bulk-banner-text { font-size:0.78rem; color:var(--gold-dk); }
.bulk-banner-name { font-weight:700; color:var(--gold); }
.btn-bulk {
  background:linear-gradient(135deg,var(--gold-dk),var(--gold-lt));
  border:none; color:#fff; padding:7px 14px; border-radius:3px;
  font-family:'Space Mono',monospace; font-size:0.6rem; font-weight:700;
  cursor:pointer; transition:all 0.2s; letter-spacing:0.08em; white-space:nowrap;
}
.btn-bulk:hover { box-shadow:var(--gold-glow); transform:translateY(-1px); }
.btn-logout {
  background:transparent; border:1px solid var(--border2); color:var(--text-muted);
  padding:5px 10px; border-radius:3px; font-family:'Space Mono',monospace; font-size:0.54rem;
  cursor:pointer; transition:all 0.2s;
}
.btn-logout:hover { border-color:var(--danger); color:var(--danger); }

/* ── MODAL ── */
.modal-overlay {
  position:fixed; inset:0; background:rgba(20,18,14,0.45); backdrop-filter:blur(6px);
  z-index:200; display:flex; align-items:center; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity 0.25s;
}
.modal-overlay.open { opacity:1; pointer-events:all; }
.modal {
  background:var(--surface); border:1px solid var(--border);
  border-radius:10px; padding:32px 28px 24px; width:92%; max-width:460px;
  max-height:92vh; overflow-y:auto;
  transform:translateY(20px) scale(0.97);
  transition:transform 0.28s cubic-bezier(.22,.68,0,1.2);
  position:relative;
  box-shadow:0 24px 64px rgba(0,0,0,0.12), 0 0 0 1px rgba(184,134,11,0.1);
}
.modal::-webkit-scrollbar { width:3px; }
.modal::-webkit-scrollbar-thumb { background:var(--gold-dk); border-radius:2px; }
.modal-overlay.open .modal { transform:translateY(0) scale(1); }
.modal::before {
  content:''; position:absolute; top:0; left:28px; right:28px; height:1px;
  background:linear-gradient(90deg,transparent,var(--gold-lt),transparent);
}
.modal-title { font-family:'Space Mono',monospace; font-size:0.58rem; letter-spacing:0.2em; color:var(--gold); margin-bottom:18px; text-transform:uppercase; }
.modal-seat { display:flex; align-items:baseline; gap:10px; margin-bottom:18px; padding-bottom:16px; border-bottom:1px solid var(--border); }
.modal-seat-num {
  font-family:'Cormorant Garamond',serif; font-size:3rem; font-weight:700; line-height:1;
  background:linear-gradient(135deg,var(--gold-dk),var(--gold-lt));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.modal-seat-label { font-size:0.68rem; color:var(--text-muted); letter-spacing:0.15em; }
.modal-close {
  position:absolute; top:14px; right:14px;
  background:transparent; border:1px solid var(--border); color:var(--text-muted);
  width:26px; height:26px; border-radius:4px; cursor:pointer; font-size:0.85rem;
  display:flex; align-items:center; justify-content:center; transition:all 0.2s;
}
.modal-close:hover { border-color:var(--danger); color:var(--danger); }

/* ── FORM ── */
.form-group { margin-bottom:13px; }
.form-label { display:block; font-family:'Space Mono',monospace; font-size:0.56rem; letter-spacing:0.14em; color:var(--text-dim); margin-bottom:6px; text-transform:uppercase; }
.form-label span { color:var(--gold-dk); margin-left:4px; }
.form-input {
  width:100%; background:var(--bg2); border:1px solid var(--border2); color:var(--text);
  padding:9px 13px; border-radius:4px; font-family:'Noto Sans JP',sans-serif; font-size:0.88rem;
  outline:none; transition:all 0.2s;
}
.form-input:focus { border-color:var(--gold); box-shadow:var(--gold-gsm); background:var(--surface); }
textarea.form-input { resize:vertical; min-height:72px; font-size:0.84rem; }
.member-toggle { display:flex; gap:6px; margin-bottom:10px; }
.member-btn {
  flex:1; padding:8px; border-radius:4px; border:1px solid var(--border2);
  background:transparent; color:var(--text-dim); font-family:'Space Mono',monospace;
  font-size:0.6rem; cursor:pointer; transition:all 0.2s; letter-spacing:0.06em;
}
.member-btn.active { border-color:var(--gold); color:var(--gold); background:var(--gold-dim); }
.member-info {
  background:var(--bg2); border:1px solid var(--border); border-radius:4px;
  padding:9px 12px; margin-bottom:12px; font-size:0.72rem; color:var(--text-dim);
}
.member-info.gold-info { border-color:rgba(184,134,11,0.3); color:var(--gold-dk); }

/* Slot chips */
.slot-grid { display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-bottom:4px; }
.slot-chip { position:relative; cursor:pointer; }
.slot-chip input { position:absolute; opacity:0; width:0; height:0; }
.slot-chip label {
  display:flex; align-items:center; justify-content:center; padding:8px 5px;
  border:1px solid var(--border2); border-radius:4px;
  font-family:'Space Mono',monospace; font-size:0.6rem; color:var(--text-dim);
  cursor:pointer; transition:all 0.18s; text-align:center;
}
.slot-chip input:checked + label { border-color:var(--gold); color:var(--gold); background:var(--gold-dim); }
.slot-chip label:hover { border-color:var(--gold-dk); color:var(--gold-dk); }
.slot-chip.disabled label { opacity:0.3; cursor:not-allowed; pointer-events:none; }
.slot-summary { font-family:'Space Mono',monospace; font-size:0.6rem; color:var(--gold-dk); margin-top:5px; min-height:15px; }

/* Buttons */
.btn-primary {
  width:100%; border:none; padding:12px; border-radius:4px; cursor:pointer; margin-top:8px;
  font-family:'Space Mono',monospace; font-size:0.7rem; letter-spacing:0.12em; font-weight:700;
  transition:all 0.22s; text-transform:uppercase;
  background:linear-gradient(135deg,var(--gold-dk) 0%,var(--gold-lt) 100%);
  color:#fff;
}
.btn-primary:hover { box-shadow:var(--gold-glow); transform:translateY(-1px); }
.btn-secondary {
  width:100%; background:transparent; border:1px solid var(--border2); color:var(--text-dim);
  padding:9px; border-radius:4px; font-family:'Space Mono',monospace; font-size:0.62rem;
  cursor:pointer; margin-top:5px; transition:all 0.2s; letter-spacing:0.06em;
}
.btn-secondary:hover { border-color:var(--gold-dk); color:var(--gold); }
.btn-secondary:disabled { opacity:0.3; cursor:default; }
.btn-danger {
  width:100%; background:transparent; border:1px solid rgba(192,57,43,0.3);
  color:var(--danger); padding:9px; border-radius:4px;
  font-family:'Space Mono',monospace; font-size:0.62rem; cursor:pointer; margin-top:5px; transition:all 0.2s;
}
.btn-danger:hover { background:rgba(192,57,43,0.05); border-color:var(--danger); }
.btn-danger:disabled { opacity:0.3; cursor:default; }

/* ── MANAGE ── */
.tabs { display:flex; gap:2px; margin-bottom:18px; border-bottom:1px solid var(--border); }
.tab-btn {
  background:transparent; border:none; border-bottom:2px solid transparent;
  color:var(--text-muted); padding:9px 18px; margin-bottom:-1px;
  font-family:'Space Mono',monospace; font-size:0.62rem; cursor:pointer;
  transition:all 0.2s; letter-spacing:0.08em; text-transform:uppercase;
}
.tab-btn.active { border-bottom-color:var(--gold); color:var(--gold); }
.manage-bar { display:flex; align-items:center; gap:12px; margin-bottom:18px; flex-wrap:wrap; }
.res-list { display:flex; flex-direction:column; gap:6px; }
.res-item {
  background:var(--surface); border:1px solid var(--border);
  border-radius:6px; padding:12px 14px; display:flex; align-items:flex-start; gap:12px; transition:border-color 0.2s;
}
.res-item:hover { border-color:var(--border2); box-shadow:0 2px 8px rgba(0,0,0,0.04); }
.res-item.no-show-item { border-left:2px solid var(--danger); }
.res-seat-badge { font-family:'Cormorant Garamond',serif; font-size:1.1rem; font-weight:700; color:var(--gold); min-width:40px; text-align:center; flex-shrink:0; margin-top:2px; }
.res-info { flex:1; min-width:0; }
.res-name { font-size:0.84rem; font-weight:500; display:flex; align-items:center; gap:6px; }
.res-member-badge { font-family:'Space Mono',monospace; font-size:0.48rem; padding:1px 5px; border-radius:2px; background:var(--gold-dim); color:var(--gold); }
.res-meta { font-family:'Space Mono',monospace; font-size:0.6rem; color:var(--text-dim); margin-top:2px; }
.res-memo-text { font-size:0.64rem; color:var(--gold-dk); margin-top:2px; font-style:italic; }
.res-comment-text { font-size:0.68rem; color:var(--text-dim); margin-top:3px; background:var(--bg2); border-radius:3px; padding:4px 8px; border-left:2px solid var(--border2); }
.res-actions { display:flex; gap:4px; flex-shrink:0; }
.action-btn {
  background:transparent; border:1px solid var(--border2); color:var(--text-muted);
  padding:4px 9px; border-radius:3px; font-size:0.6rem; cursor:pointer; transition:all 0.2s;

let reservations = [];

// ── SLOT HELPERS ──
function slotStart(s){ return s.split('〜')[0]; }
function slotEnd(s){   return s.split('〜')[1]; }
function slotsOverlap(a,b){ return !(slotEnd(a)<=slotStart(b)||slotStart(a)>=slotEnd(b)); }
function formatSlots(arr){
  if(!arr||!arr.length) return '';
  if(arr.length===1) return arr[0];
  const s=[...arr].sort((a,b)=>slotStart(a)>slotStart(b)?1:-1);
  return `${slotStart(s[0])}〜${slotEnd(s[s.length-1])}（${s.length}枠）`;
}

// ── DATE HELPERS ──
function todayStr(){ return new Date().toISOString().split('T')[0]; }
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x.toISOString().split('T')[0]; }
function formatDateJP(d){ return new Date(d+'T00:00:00').toLocaleDateString('ja-JP',{month:'numeric',day:'numeric',weekday:'short'}); }

// ── SLOT FILTER (main page) ──
let activeSlotFilters = new Set(); // empty = all

function buildSlotFilters(){
  const wrap = document.getElementById('slotFilterWrap');
  wrap.innerHTML = `<label class="slot-filter-chip ${activeSlotFilters.size===0?'active':''}" id="filterAll">
    <input type="checkbox" ${activeSlotFilters.size===0?'checked':''} onchange="toggleAllFilter(this)">全て
  </label>`;
  SLOTS.forEach(slot => {
    const lbl = document.createElement('label');
    lbl.className = 'slot-filter-chip' + (activeSlotFilters.has(slot)?' active':'');
    lbl.innerHTML = `<input type="checkbox" value="${slot}" ${activeSlotFilters.has(slot)?'checked':''} onchange="toggleSlotFilter(this)">${slot.replace('〜','–')}`;
    wrap.appendChild(lbl);
  });
}

function toggleAllFilter(el){
  activeSlotFilters.clear();
  document.querySelectorAll('#slotFilterWrap .slot-filter-chip').forEach(c=>c.classList.remove('active'));
  document.getElementById('filterAll').classList.add('active');
  renderAll();
}

function toggleSlotFilter(el){
  const slot = el.value;
  if(el.checked){ activeSlotFilters.add(slot); }
  else { activeSlotFilters.delete(slot); }
  // Update all chip active states
  document.querySelectorAll('#slotFilterWrap .slot-filter-chip input:not([onchange*="All"])').forEach(inp=>{
    inp.parentElement.classList.toggle('active', inp.checked);
  });
  if(activeSlotFilters.size===0){
    document.getElementById('filterAll').classList.add('active');
  } else {
    document.getElementById('filterAll').classList.remove('active');
  }
  renderAll();
}

function getActiveFilters(){ return activeSlotFilters.size===0 ? null : [...activeSlotFilters]; }

// ── FIREBASE ──
function setSyncing(on){
  const dot=document.getElementById('syncDot'), label=document.getElementById('syncLabel');
  if(!dot) return;
  if(on){ dot.classList.add('syncing'); label.textContent='SYNC'; }
  else { dot.classList.remove('syncing'); label.textContent='LIVE'; }
}
async function saveToStorage(){
  if(!_dbRef){ showToast('DB未接続です','error'); return; }
  setSyncing(true);
  try { await window._firebaseModules.set(_dbRef, reservations); }
  catch(e){ showToast('保存エラー: '+e.message,'error'); }
  setSyncing(false);
}

// ── CLOCK ──
function updateClock(){
  const n=new Date(), el=document.getElementById('clockDisplay');
  if(el) el.textContent=n.toLocaleDateString('ja-JP',{month:'2-digit',day:'2-digit',weekday:'short'})+'  '+n.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
}
setInterval(updateClock,1000);

// ── INIT ──
function init(){
  document.getElementById('selectedDate').value=todayStr();
  document.getElementById('manageDate').value=todayStr();
  updateClock();
  buildSlotFilters();

  function tryConnect(n){
    if(window._firebaseModules){
      const {initializeApp,getDatabase,ref,onValue}=window._firebaseModules;
      try {
        const app=initializeApp(FIREBASE_CONFIG);
        const db=getDatabase(app);
        _dbRef=ref(db,DB_PATH);
        onValue(_dbRef,(snap)=>{
          const data=snap.val();
          reservations=Array.isArray(data)?data:(data?Object.values(data):[]);
          document.getElementById('loadingOverlay').style.display='none';
          setSyncing(false);
          renderAll(); renderResList();
          scheduleAllNotifications();
        },(err)=>{
          document.getElementById('loadingOverlay').style.display='none';
          showToast('接続エラー: '+err.message,'error');
        });
      } catch(e){
        document.getElementById('loadingOverlay').style.display='none';
        showToast('Firebase設定エラー','error');
      }
    } else if(n>0){ setTimeout(()=>tryConnect(n-1),300); }
    else {
      document.getElementById('loadingOverlay').style.display='none';
      showToast('ローカルモードで動作','warning');
      renderAll(); renderResList();
    }
  }
  tryConnect(15);
}
init();
setTimeout(()=>{ checkSavedMember(); renderNotifBanner(); checkAutoCheckin(); }, 300);

// ── MEMBER MEMORY ──
function checkSavedMember(){
  if(savedMemberName && savedMemberCode && MEMBER_CODES.includes(savedMemberCode)){
    isMemberLoggedIn=true; renderMemberBanner();
  }
}
function saveMemberMemory(name,code){
  localStorage.setItem('studium_name',name); localStorage.setItem('studium_code',code.toUpperCase());
  savedMemberName=name; savedMemberCode=code.toUpperCase(); isMemberLoggedIn=true; renderMemberBanner();
}
function logoutMember(){
  localStorage.removeItem('studium_name'); localStorage.removeItem('studium_code');
  savedMemberName=''; savedMemberCode=''; isMemberLoggedIn=false; renderMemberBanner();
  showToast('ログアウトしました','warning');
}
function renderMemberBanner(){
  const el=document.getElementById('memberBanner');
  if(!el) return;
  if(isMemberLoggedIn){
    el.innerHTML=`<div class="bulk-banner"><div class="bulk-banner-text">★ 会員 <span class="bulk-banner-name">${savedMemberName}</span> さん — 1週間分まとめて予約できます</div><div style="display:flex;gap:6px;"><button class="btn-bulk" onclick="openBulkModal(null)">一括予約</button><button class="btn-logout" onclick="logoutMember()">ログアウト</button></div></div>`;

// ── FILTERS ──
function getFilteredReservations(){
  const date=document.getElementById('selectedDate').value;
  const filters=getActiveFilters();
  return reservations.filter(r=>{
    if(r.date!==date) return false;
    if(!filters) return true;
    const slots=r.slots||(r.slot?[r.slot]:[]);
    return filters.some(f=>slots.some(s=>slotsOverlap(s,f)));
  });
}

// ── RENDER ──
function renderAll(){ renderStats(); renderSeats(); renderNoShowAlert(); }

function renderStats(){
  const dr=getFilteredReservations();
  const used=new Set(dr.map(r=>r.seatId));
  const empty=SEAT_COUNT-used.size, pending=dr.filter(r=>r.status==='pending').length,
        present=dr.filter(r=>r.status==='present').length, noshow=dr.filter(r=>r.status==='noshow').length;
  document.getElementById('statsRow').innerHTML=`
    <div class="stat-card s-open"><div class="stat-num gold">${empty}</div><div class="stat-label">空席</div></div>
    <div class="stat-card s-rsv"><div class="stat-num purple">${pending}</div><div class="stat-label">予約済</div></div>
    <div class="stat-card s-ok"><div class="stat-num green">${present}</div><div class="stat-label">来塾中</div></div>
    <div class="stat-card s-ng"><div class="stat-num red">${noshow}</div><div class="stat-label">無断欠席</div></div>`;
}

function renderNoShowAlert(){
  const ns=getFilteredReservations().filter(r=>r.status==='noshow');
  document.getElementById('noShowAlert').innerHTML=ns.length
    ?`<div class="noshow-alert">⚠ <strong style="color:var(--danger-lt)">${ns.length}件</strong> の無断欠席があります</div>`:'';
}

function renderSeats(){
  const date=document.getElementById('selectedDate').value;
  const filters=getActiveFilters();
  const grid=document.getElementById('seatsGrid');
  grid.innerHTML='';

  for(let i=1;i<=SEAT_COUNT;i++){
    const allSeatRes=reservations.filter(r=>r.seatId===i&&r.date===date&&r.status!=='noshow');
    const filteredRes=!filters?allSeatRes:allSeatRes.filter(r=>{
      const slots=r.slots||(r.slot?[r.slot]:[]);
      return filters.some(f=>slots.some(s=>slotsOverlap(s,f)));
    });
    const isTaken=filteredRes.length>0;
    let cls,icon,nameEl,timeEl,memoEl='',commentEl='',badge;

    if(!isTaken){
      cls='empty'; icon='◇';
      nameEl=`<span style="color:var(--text-muted)">空き</span>`;
      timeEl=allSeatRes.length>0?`他${allSeatRes.length}件の予約あり`:'';
      badge='OPEN';
      if(allSeatRes.length>0){ icon='◈'; nameEl=`<span style="color:var(--gold-dk);font-size:0.72rem;">一部空き</span>`; }
    } else {
      const latest=filteredRes.sort((a,b)=>b.id-a.id)[0];
      const slots=latest.slots||(latest.slot?[latest.slot]:[]);
      const mm=latest.isMember?' ★':'';
      memoEl=latest.memo||''; commentEl=latest.comment||'';
      if(latest.status==='noshow'){  cls='no-show';     icon='✕'; nameEl=latest.name+mm; timeEl=formatSlots(slots); badge='NO SHOW'; }
      else if(latest.status==='present'){ cls='present-seat'; icon='✓'; nameEl=latest.name+mm; timeEl=formatSlots(slots); badge='IN USE'; }
      else { cls='reserved'; icon='◆'; nameEl=latest.name+mm; timeEl=formatSlots(slots); badge='RSVD'; }
    }

    const c=document.createElement('div');
    c.className=`seat-card ${cls}${(!isTaken&&allSeatRes.length>0)?' partial':''}`;
    c.innerHTML=`
      <div class="seat-num">SEAT ${String(i).padStart(2,'0')}</div>
      <span class="seat-icon">${icon}</span>
      <div class="seat-name">${nameEl}</div>
      <div class="seat-time">${timeEl}</div>
      ${memoEl?`<div class="seat-memo">〜 ${memoEl}</div>`:''}
      ${commentEl?`<div class="seat-comment">💬 ${commentEl}</div>`:''}
      <div class="seat-badge">${badge}</div>`;
    c.onclick=!isTaken?()=>openReserveModal(i):()=>openInfoModal(filteredRes.sort((a,b)=>b.id-a.id)[0]);
    grid.appendChild(c);
  }
}

// ── MODAL: RESERVE ──
function buildSlotChips(seatId,date){
  const grid=document.getElementById('slotGrid');
  grid.innerHTML='';
  SLOTS.forEach((slot,idx)=>{
    const taken=reservations.some(r=>{
      if(r.seatId!==seatId||r.date!==date||r.status==='noshow') return false;
      const slots=r.slots||(r.slot?[r.slot]:[]);
      return slots.some(s=>slotsOverlap(s,slot));
    });
    const chip=document.createElement('div');
    chip.className='slot-chip'+(taken?' disabled':'');
    chip.innerHTML=`
      <input type="checkbox" id="slot_${idx}" value="${slot}" ${taken?'disabled':''} onchange="updateSlotSummary()">
      <label for="slot_${idx}">${slot}${taken?'<br><span style="font-size:0.48rem;color:var(--danger);">満席</span>':''}</label>`;
    grid.appendChild(chip);
  });
  updateSlotSummary();
}
function updateSlotSummary(){
  const sel=getSelectedSlots(), el=document.getElementById('slotSummary');
  el.textContent=sel.length?'◆ '+formatSlots(sel):'スロットを選択してください';
  el.style.color=sel.length?'var(--gold)':'var(--text-muted)';
}
function getSelectedSlots(){ return Array.from(document.querySelectorAll('#slotGrid input:checked')).map(c=>c.value); }

function openReserveModal(seatId){
  selectedSeatId=seatId;
  document.getElementById('modalSeatNum').textContent=String(seatId).padStart(2,'0');
  document.getElementById('inputMemo').value='';
  document.getElementById('inputComment').value='';
  const today=todayStr();
  document.getElementById('inputDate').value=today;
  document.getElementById('inputDate').min=today;

  if(isMemberLoggedIn){
    document.getElementById('inputName').value=savedMemberName;
    document.getElementById('inputCode').value=savedMemberCode;
    codeVerified=true; memberType='member'; selectMemberType('member');
    document.getElementById('codeStatus').textContent='✓ 認証OK — 1週間先まで予約可能';
    document.getElementById('codeStatus').style.color='var(--success)';
    document.getElementById('inputDate').max=addDays(today,7);
    document.getElementById('dateRangeHint').textContent=`〜 ${formatDateJP(addDays(today,7))}`;
  } else {
    document.getElementById('inputName').value='';
    document.getElementById('inputCode').value='';
    document.getElementById('codeStatus').textContent='';
    codeVerified=false; memberType='guest';
    document.getElementById('inputDate').max=today;
    selectMemberType('guest');
  }

  const filters=getActiveFilters();
  buildSlotChips(seatId,today);
  if(filters){
    filters.forEach(f=>{
      const el=document.querySelector(`#slotGrid input[value="${f}"]`);
      if(el&&!el.disabled){ el.checked=true; }
    });
    updateSlotSummary();
  }
  openModal('reserveModal');
}

function selectMemberType(type){
  memberType=type;
  const today=todayStr();
  document.getElementById('btnGuest').classList.toggle('active',type==='guest');
  document.getElementById('btnMember').classList.toggle('active',type==='member');
  document.getElementById('codeGroup').style.display=type==='member'?'block':'none';
  if(type==='guest'){
    document.getElementById('inputDate').min=today; document.getElementById('inputDate').max=today; document.getElementById('inputDate').value=today;
    document.getElementById('memberInfo').textContent='一般予約：本日のみ予約可能';
    document.getElementById('memberInfo').className='member-info';
    document.getElementById('dateRangeHint').textContent='（本日のみ）'; codeVerified=false;
  } else {
    document.getElementById('memberInfo').textContent='★ 会員コードを入力すると1週間先まで予約できます';
    document.getElementById('memberInfo').className='member-info gold-info';
    document.getElementById('dateRangeHint').textContent='';
    document.getElementById('inputDate').min=today; document.getElementById('inputDate').max=today;
  }
  buildSlotChips(selectedSeatId, document.getElementById('inputDate').value||today);
}

function onModalDateChange(){
  const date=document.getElementById('inputDate').value;
  if(date) buildSlotChips(selectedSeatId,date);
}

function validateCode(){
  const code=document.getElementById('inputCode').value.trim().toUpperCase();
  const statusEl=document.getElementById('codeStatus'), dateInput=document.getElementById('inputDate'), today=todayStr();
  if(MEMBER_CODES.includes(code)){
    codeVerified=true; statusEl.textContent='✓ 認証OK — 1週間先まで予約可能'; statusEl.style.color='var(--success)';
    dateInput.max=addDays(today,7); document.getElementById('dateRangeHint').textContent=`〜 ${formatDateJP(addDays(today,7))}`;
  } else {
    codeVerified=false; statusEl.textContent=code.length>0?'✕ コードが正しくありません':''; statusEl.style.color='var(--danger)';
    dateInput.max=today; document.getElementById('dateRangeHint').textContent='';
  }
}

async function confirmReservation(){
  const name=document.getElementById('inputName').value.trim();
  const slots=getSelectedSlots();
  const date=document.getElementById('inputDate').value;
  const memo=document.getElementById('inputMemo').value.trim();
  const comment=document.getElementById('inputComment').value.trim();
  const today=todayStr();
  if(!name){ showToast('氏名を入力してください','error'); return; }
  if(!slots.length){ showToast('スロットを選択してください','error'); return; }
  if(!date){ showToast('日付を選択してください','error'); return; }
  if(memberType==='member'&&!codeVerified){ showToast('有効な会員コードを入力してください','error'); return; }
  if(memberType==='guest'&&date!==today){ showToast('一般予約は本日のみです','error'); return; }
  if(memberType==='member'&&date>addDays(today,7)){ showToast('予約は1週間先までです','error'); return; }
  const takenSlot=slots.find(slot=>reservations.some(r=>
    r.seatId===selectedSeatId&&r.date===date&&r.status!=='noshow'&&
    (r.slots||(r.slot?[r.slot]:[])).some(s=>slotsOverlap(s,slot))
  ));
  if(takenSlot){ showToast(`${takenSlot} は既に予約済です`,'error'); return; }
  if(memberType==='member'&&codeVerified) saveMemberMemory(name,document.getElementById('inputCode').value.trim());
  const newRes = { id:Date.now(), seatId:selectedSeatId, name, date, slots, memo, comment, isMember:memberType==='member', status:'pending', createdAt:new Date().toISOString() };
  reservations.push(newRes);
  lastReservationId = newRes.id;
  await saveToStorage(); renderAll(); renderResList();
  // Show QR button in modal
  document.getElementById('btnShowQR').style.display = 'block';
  showToast(`Seat ${String(selectedSeatId).padStart(2,'0')} を予約しました — QRコードを保存してください`, 'success');
  scheduleAllNotifications();
}

async function markPresent(){ await setStatus(infoResId,'present'); closeModal('infoModal'); showToast('来塾を確認しました','success'); }
async function markAbsent(){  await setStatus(infoResId,'noshow');  closeModal('infoModal'); showToast('無断欠席としてマークしました','warning'); }
async function cancelReservation(){
  reservations=reservations.filter(r=>r.id!==infoResId); await saveToStorage();
  closeModal('infoModal'); renderAll(); renderResList(); showToast('予約をキャンセルしました','error');
}
async function setStatus(id,status){
  const r=reservations.find(r=>r.id===id); if(r){ r.status=status; await saveToStorage(); }

}

// ── BULK RESERVATION ──
function openBulkModal(seatId){
  if(seatId) selectedSeatId=seatId;
  if(!selectedSeatId){ showToast('先に座席を選択してください','error'); return; }
  if(!isMemberLoggedIn){ showToast('会員ログインが必要です','error'); return; }
  document.getElementById('bulkSeatNum').textContent=String(selectedSeatId).padStart(2,'0');
  document.getElementById('bulkMemo').value=''; document.getElementById('bulkComment').value='';
  document.getElementById('bulkMemberBadge').innerHTML=`★ <strong style="color:var(--gold)">${savedMemberName}</strong> さんとして予約`;
  const today=todayStr(), dg=document.getElementById('bulkDateGrid');
  dg.innerHTML='';
  for(let d=0;d<=6;d++){
    const ds=addDays(today,d), dobj=new Date(ds+'T00:00:00');
    const chip=document.createElement('div'); chip.className='bulk-date-chip';
    chip.innerHTML=`<input type="checkbox" id="bdate_${d}" value="${ds}" onchange="updateBulkConflict()">
      <label for="bdate_${d}"><span style="font-size:0.68rem;color:var(--text);font-weight:500;">${dobj.toLocaleDateString('ja-JP',{month:'numeric',day:'numeric'})}</span><span style="color:var(--gold-dk);">${dobj.toLocaleDateString('ja-JP',{weekday:'short'})}</span></label>`;
    dg.appendChild(chip);
  }
  const sg=document.getElementById('bulkSlotGrid');
  sg.innerHTML='';
  SLOTS.forEach((slot,idx)=>{
    const chip=document.createElement('div'); chip.className='slot-chip';
    chip.innerHTML=`<input type="checkbox" id="bslot_${idx}" value="${slot}" onchange="updateBulkConflict();updateBulkSlotSummary()"><label for="bslot_${idx}">${slot}</label>`;
    sg.appendChild(chip);
  });
  updateBulkSlotSummary(); updateBulkConflict(); openModal('bulkModal');
}
function updateBulkSlotSummary(){
  const sel=getBulkSelectedSlots(), el=document.getElementById('bulkSlotSummary');
  el.textContent=sel.length?'◆ '+formatSlots(sel):'スロットを選択してください';
  el.style.color=sel.length?'var(--gold)':'var(--text-muted)';
}
function getBulkSelectedDates(){ return Array.from(document.querySelectorAll('#bulkDateGrid input:checked')).map(c=>c.value); }
function getBulkSelectedSlots(){ return Array.from(document.querySelectorAll('#bulkSlotGrid input:checked')).map(c=>c.value); }
function updateBulkConflict(){
  const dates=getBulkSelectedDates(), slots=getBulkSelectedSlots(), conflicts=[];
  dates.forEach(date=>slots.forEach(slot=>{
    const taken=reservations.some(r=>r.seatId===selectedSeatId&&r.date===date&&r.status!=='noshow'&&
      (r.slots||(r.slot?[r.slot]:[])).some(s=>slotsOverlap(s,slot)));
    if(taken) conflicts.push(`${formatDateJP(date)} ${slot}`);
  }));
  const el=document.getElementById('bulkConflictWarning');
  el.textContent=conflicts.length?`⚠ スキップ: ${conflicts.join(' / ')}` :'';
}
async function confirmBulkReservation(){
  const dates=getBulkSelectedDates(), slots=getBulkSelectedSlots();
  const memo=document.getElementById('bulkMemo').value.trim();
  const comment=document.getElementById('bulkComment').value.trim();
  if(!dates.length){ showToast('日付を選択してください','error'); return; }
  if(!slots.length){ showToast('スロットを選択してください','error'); return; }
  let added=0,skipped=0;
  dates.forEach(date=>slots.forEach(slot=>{
    const taken=reservations.some(r=>r.seatId===selectedSeatId&&r.date===date&&r.status!=='noshow'&&
      (r.slots||(r.slot?[r.slot]:[])).some(s=>slotsOverlap(s,slot)));
    if(taken){ skipped++; return; }
    reservations.push({ id:Date.now()+Math.random(), seatId:selectedSeatId, name:savedMemberName,
      date, slots:[slot], memo, comment, isMember:true, status:'pending', createdAt:new Date().toISOString() });
    added++;
  }));
  if(added>0){
    await saveToStorage(); closeModal('bulkModal'); renderAll(); renderResList();
    showToast(`${added}件予約しました${skipped>0?`（${skipped}件スキップ）`:''}`, 'success');
  } else { showToast('予約できるスロットがありませんでした','error'); }
}

// ── MANAGE ──
function switchTab(tab){
  currentTab=tab;

  renderResList();
}

  const sm={pending:'PENDING',present:'PRESENT',noshow:'NO SHOW'};

        ${r.memo?`<div class="res-memo-text">〜 ${r.memo}</div>`:''}
        ${r.comment?`<div class="res-comment-text">💬 ${r.comment}</div>`:''}
      </div>
      <span class="res-status-badge ${sc[r.status]}">${sm[r.status]}</span>
      <div class="res-actions">
        ${r.status==='pending'?`<button class="action-btn check" onclick="qStatus(${r.id},'present')">来塾</button><button class="action-btn absent" onclick="qStatus(${r.id},'noshow')">欠席</button>`:''}
        ${r.status!=='present'?`<button class="action-btn" onclick="delRes(${r.id})">削除</button>`:''}
      </div>
    </div>`).join('')}</div>`;
}
async function qStatus(id,status){ await setStatus(id,status); showToast(status==='present'?'来塾を確認しました':'無断欠席としてマークしました',status==='present'?'success':'warning'); }
async function delRes(id){ reservations=reservations.filter(r=>r.id!==id); await saveToStorage(); renderResList(); renderAll(); showToast('削除しました','error'); }


// ══════════════════════════════════════════
// QR CODE & CHECK-IN
// ══════════════════════════════════════════
let currentQRResId = null;

function generateQRUrl(resId){
  const base = window.location.href.split('?')[0];
  return `${base}?checkin=${resId}`;
}

function showQRModal(res){
  currentQRResId = res.id;
  document.getElementById('qrName').textContent = res.name;
  document.getElementById('qrSeatLabel').textContent = `SEAT ${String(res.seatId).padStart(2,'0')}`;
  const slots = res.slots || (res.slot ? [res.slot] : []);
  document.getElementById('qrSlots').textContent = `${formatDateJP(res.date)}　${formatSlots(slots)}`;

  // Generate QR
  const qrWrap = document.getElementById('qrCanvas');
  qrWrap.innerHTML = '';
  new QRCode(qrWrap, {
    text: generateQRUrl(res.id),
    width: 180, height: 180,
    colorDark: '#1a1814', colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M
  });

  // Check if already checked in
  const isPresent = res.status === 'present';
  const btnCI = document.getElementById('btnCheckin');
  const ciResult = document.getElementById('checkinResult');
  if(isPresent){
    btnCI.disabled = true;
    ciResult.innerHTML = `<div class="checkin-success">✓ 入室済み（${formatDateJP(res.date)}）</div>`;
  } else {
    btnCI.disabled = false;
    ciResult.innerHTML = '';
  }
  openModal('qrModal');
}

async function doCheckin(){
  const res = reservations.find(r => r.id === currentQRResId);
  if(!res){ showToast('予約が見つかりません','error'); return; }
  if(res.status === 'present'){ showToast('すでに入室済みです','warning'); return; }
  res.status = 'present';
  res.checkinTime = new Date().toISOString();
  await saveToStorage();
  document.getElementById('btnCheckin').disabled = true;
  document.getElementById('checkinResult').innerHTML = `<div class="checkin-success">✓ 入室を記録しました！<br><span style="font-size:0.7rem;">${new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})}</span></div>`;
  renderAll(); renderResList();
  showToast(`${res.name} さんの入室を記録しました`, 'success');
  // Fire notification to admin
  fireNotification(`✓ 入室: ${res.name} さん (Seat ${String(res.seatId).padStart(2,'0')})`, `${formatSlots(res.slots||[res.slot])} に入室しました`);
}

// Show QR after reservation (for the just-made reservation)
let lastReservationId = null;
function showMyQR(){
  const res = reservations.find(r => r.id === lastReservationId);
  if(res) showQRModal(res);
}

// Auto check-in via URL param
function checkAutoCheckin(){
  const params = new URLSearchParams(window.location.search);
  const resId = params.get('checkin');
  if(!resId) return;
  // Wait for Firebase data then auto-open QR
  const check = () => {
    const numId = parseFloat(resId);
    const res = reservations.find(r => r.id === numId);
    if(res){ showQRModal(res); history.replaceState({},'',window.location.pathname); }
    else { setTimeout(check, 500); }
  };
  setTimeout(check, 800);
}

// ══════════════════════════════════════════
// BROWSER NOTIFICATIONS
// ══════════════════════════════════════════
let notifPermission = Notification.permission;
let notifTimers = [];

function renderNotifBanner(){
  const el = document.getElementById('notifBanner');
  if(!el) return;
  if(notifPermission === 'granted'){
    el.innerHTML = `<div class="notif-banner">🔔 予約時間の通知が有効です <button onclick="disableNotif()">無効にする</button></div>`;
  } else if(notifPermission === 'denied'){
    el.innerHTML = '';
  } else {
    el.innerHTML = `<div class="notif-ask-banner">🔔 予約時間になったら通知を受け取れます <button onclick="requestNotif()" style="background:var(--gold-dim);border-color:var(--gold);color:var(--gold-dk);">通知を許可する</button></div>`;
  }
}

async function requestNotif(){
  notifPermission = await Notification.requestPermission();
  renderNotifBanner();
  if(notifPermission === 'granted'){
    showToast('通知を許可しました','success');
    scheduleAllNotifications();
  }
}

function disableNotif(){
  notifTimers.forEach(t => clearTimeout(t));
  notifTimers = [];
  showToast('通知タイマーをクリアしました','warning');
}

function fireNotification(title, body){
  if(notifPermission !== 'granted') return;
  try {
    new Notification(title, {
      body,
      icon: 'https://cdn-icons-png.flaticon.com/512/2232/2232688.png',
      badge: 'https://cdn-icons-png.flaticon.com/512/2232/2232688.png'
    });
  } catch(e){ console.log('Notif error:', e); }
}

function scheduleAllNotifications(){
  // Clear existing timers
  notifTimers.forEach(t => clearTimeout(t));
  notifTimers = [];
  if(notifPermission !== 'granted') return;

  const now = new Date();
  const todayStr_ = todayStr();

  reservations.forEach(res => {
    if(res.date !== todayStr_) return;
    if(res.status !== 'pending') return;
    const slots = res.slots || (res.slot ? [res.slot] : []);
    slots.forEach(slot => {
      const startTime = slotStart(slot); // e.g. "18:00"
      const [h, m] = startTime.split(':').map(Number);
      const slotDate = new Date();
      slotDate.setHours(h, m, 0, 0);
      const msUntil = slotDate - now;
      // Notify 5 min before
      const msEarly = msUntil - 5 * 60 * 1000;
      if(msEarly > 0){
        const t1 = setTimeout(() => {
          fireNotification(
            `⏰ まもなく予約時間です`,
            `${res.name} さん — Seat ${String(res.seatId).padStart(2,'0')} (${slot}) まで5分`
          );
        }, msEarly);
        notifTimers.push(t1);
      }
      // Notify at exact time
      if(msUntil > 0){
        const t2 = setTimeout(() => {
          fireNotification(
            `📚 予約時間になりました`,
            `${res.name} さん — Seat ${String(res.seatId).padStart(2,'0')} (${slot})`
          );
        }, msUntil);
        notifTimers.push(t2);
      }
    });
  });
}


// ── UTILS ──
function openModal(id){ document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(el=>{ el.addEventListener('click',e=>{ if(e.target===el) el.classList.remove('open'); }); });
let adminUnlocked = sessionStorage.getItem('studium_admin') === 'yes';

function showPage(id, e){
  if(id === 'manage' && !adminUnlocked){
    document.getElementById('adminPwInput').value = '';
    document.getElementById('adminPwError').textContent = '';
    document.getElementById('adminLockOverlay').style.display = 'flex';
    return;
  }
  _doShowPage(id, e);
}

function _doShowPage(id, e){
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if(e && e.target) e.target.classList.add('active');
  else {
    const btns = document.querySelectorAll('.nav-btn');
    btns.forEach(b => { if(b.getAttribute('onclick') && b.getAttribute('onclick').includes("'"+id+"'")) b.classList.add('active'); });
  }
  if(id === 'manage') renderResList();
}

function checkAdminPassword(){
  const pw = document.getElementById('adminPwInput').value.trim();
  if(pw === ADMIN_PASSWORD){
    adminUnlocked = true;
    sessionStorage.setItem('studium_admin', 'yes');
    document.getElementById('adminLockOverlay').style.display = 'none';
    _doShowPage('manage', null);
  } else {
    document.getElementById('adminPwError').textContent = '✕ パスワードが正しくありません';
    document.getElementById('adminPwInput').value = '';
    setTimeout(() => document.getElementById('adminPwInput').focus(), 100);
  }
}

function cancelAdminLogin(){
  document.getElementById('adminLockOverlay').style.display = 'none';
  _doShowPage('reserve', null);
}
function showToast(msg,type='success'){
  const icons={success:'◆',error:'✕',warning:'⚠'}, colors={success:'var(--gold)',error:'var(--danger)',warning:'var(--gold-lt)'};
  const t=document.createElement('div'); t.className=`toast ${type}`;
  t.innerHTML=`<span style="color:${colors[type]}">${icons[type]}</span><span>${msg}</span>`;
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(()=>t.remove(),3200);
}
</script>
