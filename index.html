<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STUDIUM — 自習室予約</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#07080a; --bg2:#0c0d10; --surface:#111318; --surface2:#161820;
  --border:#1f2128; --border2:#2a2c36;
  --gold:#c9a84c; --gold-lt:#e8c97a; --gold-dk:#8c6c28;
  --gold-dim:rgba(201,168,76,0.12); --gold-glow:0 0 28px rgba(201,168,76,0.35);
  --gold-gsm:0 0 12px rgba(201,168,76,0.2);
  --danger:#c0392b; --danger-lt:#e74c3c;
  --success:#1a7a4a; --success-lt:#27ae60;
  --text:#e8e6df; --text-dim:#8a8880; --text-muted:#4a4a4a;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(201,168,76,0.07) 0%,transparent 60%),
    radial-gradient(ellipse 40% 30% at 90% 80%,rgba(201,168,76,0.04) 0%,transparent 50%),
    repeating-linear-gradient(0deg,transparent,transparent 59px,rgba(201,168,76,0.025) 60px),
    repeating-linear-gradient(90deg,transparent,transparent 59px,rgba(201,168,76,0.025) 60px);}
body::after{content:'';position:fixed;top:0;left:0;right:0;height:2px;z-index:999;
  background:linear-gradient(90deg,transparent 0%,var(--gold-dk) 20%,var(--gold-lt) 50%,var(--gold-dk) 80%,transparent 100%);}
.container{position:relative;z-index:1;max-width:1080px;margin:0 auto;padding:0 24px;}

/* ── HEADER ── */
header{border-bottom:1px solid var(--border);padding:18px 0;background:rgba(7,8,10,0.93);backdrop-filter:blur(16px);position:sticky;top:0;z-index:100;}
.header-inner{display:flex;align-items:center;justify-content:space-between;max-width:1080px;margin:0 auto;padding:0 24px;}
.logo-wrap{display:flex;flex-direction:column;gap:2px;}
.logo{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:600;letter-spacing:0.25em;
  background:linear-gradient(135deg,var(--gold-dk) 0%,var(--gold-lt) 50%,var(--gold-dk) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 8px rgba(201,168,76,0.4));}
.logo-sub{font-family:'Space Mono',monospace;font-size:0.5rem;letter-spacing:0.35em;color:var(--text-dim);text-transform:uppercase;}
.header-right{display:flex;align-items:center;gap:14px;}
.header-time{font-family:'Space Mono',monospace;font-size:0.72rem;color:var(--text-dim);letter-spacing:0.08em;}
.sync-indicator{display:flex;align-items:center;gap:6px;font-family:'Space Mono',monospace;font-size:0.58rem;color:var(--text-muted);letter-spacing:0.08em;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--success-lt);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
.sync-dot.syncing{background:var(--gold);animation:spin-pulse 1s infinite;}
@keyframes spin-pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.5;transform:scale(0.7);}}
.header-nav{display:flex;gap:4px;}
.nav-btn{background:transparent;border:1px solid var(--border2);color:var(--text-dim);padding:7px 16px;border-radius:4px;
  font-family:'Space Mono',monospace;font-size:0.62rem;letter-spacing:0.12em;cursor:pointer;transition:all 0.25s;text-transform:uppercase;}
.nav-btn:hover{border-color:var(--gold-dk);color:var(--gold);}
.nav-btn.active{border-color:var(--gold);color:var(--gold);background:var(--gold-dim);box-shadow:var(--gold-gsm);}

main{padding:32px 0 80px;}

/* ── DATE BAR ── */
.date-bar{display:flex;align-items:center;gap:14px;margin-bottom:28px;flex-wrap:wrap;padding-bottom:18px;border-bottom:1px solid var(--border);}
.date-label{font-family:'Space Mono',monospace;font-size:0.58rem;letter-spacing:0.18em;color:var(--gold-dk);text-transform:uppercase;}
.date-input,.time-select{background:var(--surface);border:1px solid var(--border2);color:var(--text);padding:8px 13px;border-radius:4px;
  font-family:'Space Mono',monospace;font-size:0.78rem;outline:none;cursor:pointer;transition:all 0.2s;}
.date-input:focus,.time-select:focus{border-color:var(--gold);box-shadow:var(--gold-gsm);}

/* ── STATS ── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:32px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:16px;position:relative;overflow:hidden;transition:transform 0.2s;}
.stat-card::before{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;opacity:0;transition:opacity 0.25s;}
.stat-card:hover{transform:translateY(-1px);}
.stat-card:hover::before{opacity:1;}
.stat-card.s-open::before{background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.stat-card.s-rsv::before{background:linear-gradient(90deg,transparent,#a78bfa,transparent);}
.stat-card.s-ok::before{background:linear-gradient(90deg,transparent,var(--success-lt),transparent);}
.stat-card.s-ng::before{background:linear-gradient(90deg,transparent,var(--danger-lt),transparent);}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:2.4rem;font-weight:700;line-height:1;}
.stat-num.gold{color:var(--gold);text-shadow:0 0 16px rgba(201,168,76,0.4);}
.stat-num.purple{color:#a78bfa;}
.stat-num.green{color:var(--success-lt);}
.stat-num.red{color:var(--danger-lt);}
.stat-label{font-size:0.66rem;color:var(--text-dim);margin-top:4px;}

/* ── SECTION TITLE ── */
.section-title{font-family:'Space Mono',monospace;font-size:0.58rem;letter-spacing:0.2em;color:var(--gold-dk);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:12px;}
.section-title::before{content:'';width:20px;height:1px;background:var(--gold-dk);}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);}

/* ── LEGEND ── */
.legend{display:flex;gap:20px;margin-bottom:20px;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:7px;font-size:0.7rem;color:var(--text-dim);}
.legend-dot{width:8px;height:8px;border-radius:2px;}
.ld-empty{background:var(--border2);} .ld-reserved{background:#7c3aed;} .ld-present{background:var(--success);} .ld-noshow{background:var(--danger);}

/* ── SEATS ── */
.seats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:32px;}
.seat-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:16px 13px 13px;
  cursor:pointer;transition:all 0.25s;position:relative;overflow:hidden;user-select:none;}
.seat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;opacity:0;transition:opacity 0.25s;}
.seat-card.empty::after{background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.seat-card.empty:hover{border-color:var(--gold-dk);box-shadow:var(--gold-gsm),inset 0 0 30px rgba(201,168,76,0.03);}
.seat-card.empty:hover::after{opacity:1;}
/* Partial = empty card with some bookings in other slots */
.seat-card.empty.partial{border-color:rgba(201,168,76,0.25);}
.seat-card.empty.partial .seat-badge{background:rgba(201,168,76,0.18);color:var(--gold);}
.seat-card.reserved{border-color:#3b1f7a;background:linear-gradient(135deg,var(--surface),rgba(60,30,120,0.15));cursor:pointer;}
.seat-card.reserved::after{background:linear-gradient(90deg,transparent,#7c3aed,transparent);opacity:0.5;}
.seat-card.present-seat{border-color:var(--success);background:linear-gradient(135deg,var(--surface),rgba(26,122,74,0.1));cursor:pointer;}
.seat-card.present-seat::after{background:linear-gradient(90deg,transparent,var(--success-lt),transparent);opacity:0.4;}
.seat-card.no-show{border-color:#5a1515;background:linear-gradient(135deg,var(--surface),rgba(192,57,43,0.1));cursor:pointer;}
.seat-card.no-show::after{background:linear-gradient(90deg,transparent,var(--danger-lt),transparent);opacity:0.4;}
.seat-num{font-family:'Space Mono',monospace;font-size:0.56rem;color:var(--text-muted);letter-spacing:0.12em;margin-bottom:8px;}
.seat-icon{font-size:1.2rem;margin-bottom:6px;display:block;}
.seat-name{font-size:0.78rem;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.seat-time{font-family:'Space Mono',monospace;font-size:0.58rem;color:var(--text-dim);margin-top:3px;}
.seat-memo{font-size:0.66rem;color:var(--gold-dk);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.seat-badge{position:absolute;top:9px;right:9px;font-family:'Space Mono',monospace;font-size:0.52rem;padding:2px 6px;border-radius:2px;letter-spacing:0.08em;text-transform:uppercase;}
.seat-card.empty .seat-badge{background:rgba(201,168,76,0.12);color:var(--gold-dk);}
.seat-card.reserved .seat-badge{background:rgba(124,58,237,0.18);color:#a78bfa;}
.seat-card.present-seat .seat-badge{background:rgba(39,174,96,0.15);color:var(--success-lt);}
.seat-card.no-show .seat-badge{background:rgba(192,57,43,0.18);color:var(--danger-lt);}

/* ── ALERT ── */
.noshow-alert{background:linear-gradient(90deg,rgba(192,57,43,0.1),rgba(192,57,43,0.05));border:1px solid rgba(192,57,43,0.35);border-left:3px solid var(--danger-lt);border-radius:4px;padding:12px 16px;margin-bottom:20px;display:flex;align-items:center;gap:12px;font-size:0.8rem;}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.84);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:32px 28px 24px;width:92%;max-width:440px;
  max-height:90vh;overflow-y:auto;
  transform:translateY(24px) scale(0.96);transition:transform 0.3s cubic-bezier(.22,.68,0,1.2);position:relative;
  box-shadow:0 32px 80px rgba(0,0,0,0.6),0 0 0 1px rgba(201,168,76,0.08);}
.modal::-webkit-scrollbar{width:4px;}
.modal::-webkit-scrollbar-track{background:transparent;}
.modal::-webkit-scrollbar-thumb{background:var(--gold-dk);border-radius:2px;}
.modal-overlay.open .modal{transform:translateY(0) scale(1);}
.modal::before{content:'';position:absolute;top:0;left:28px;right:28px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.modal-title{font-family:'Space Mono',monospace;font-size:0.58rem;letter-spacing:0.2em;color:var(--gold);margin-bottom:18px;text-transform:uppercase;}
.modal-seat{display:flex;align-items:baseline;gap:10px;margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid var(--border);}
.modal-seat-num{font-family:'Cormorant Garamond',serif;font-size:2.8rem;font-weight:700;line-height:1;
  background:linear-gradient(135deg,var(--gold-dk),var(--gold-lt));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.modal-seat-label{font-size:0.68rem;color:var(--text-dim);letter-spacing:0.15em;}
.modal-close{position:absolute;top:14px;right:14px;background:transparent;border:1px solid var(--border2);color:var(--text-muted);width:26px;height:26px;border-radius:4px;cursor:pointer;font-size:0.85rem;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.modal-close:hover{border-color:var(--danger);color:var(--danger-lt);}

/* ── FORM ── */
.form-group{margin-bottom:12px;}
.form-label{display:block;font-family:'Space Mono',monospace;font-size:0.56rem;letter-spacing:0.15em;color:var(--text-dim);margin-bottom:6px;text-transform:uppercase;}
.form-label span{color:var(--gold-dk);margin-left:4px;}
.form-input{width:100%;background:var(--surface);border:1px solid var(--border2);color:var(--text);padding:9px 13px;border-radius:4px;font-family:'Noto Sans JP',sans-serif;font-size:0.88rem;outline:none;transition:all 0.2s;}
.form-input:focus{border-color:var(--gold);box-shadow:var(--gold-gsm);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.member-toggle{display:flex;gap:8px;margin-bottom:12px;}
.member-btn{flex:1;padding:8px;border-radius:4px;border:1px solid var(--border2);background:transparent;color:var(--text-dim);font-family:'Space Mono',monospace;font-size:0.62rem;cursor:pointer;transition:all 0.2s;letter-spacing:0.08em;}
.member-btn.active{border-color:var(--gold);color:var(--gold);background:var(--gold-dim);}
.member-info{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:10px 12px;margin-bottom:12px;font-size:0.72rem;color:var(--text-dim);display:flex;align-items:center;gap:8px;}
.member-info.gold-info{border-color:rgba(201,168,76,0.3);color:var(--gold-dk);}

/* ── SLOT PICKER ── */
.slot-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:4px;}
.slot-chip{position:relative;cursor:pointer;}
.slot-chip input{position:absolute;opacity:0;width:0;height:0;}
.slot-chip label{display:flex;align-items:center;justify-content:center;gap:6px;padding:9px 6px;border:1px solid var(--border2);border-radius:4px;font-family:'Space Mono',monospace;font-size:0.62rem;color:var(--text-dim);cursor:pointer;transition:all 0.2s;letter-spacing:0.05em;text-align:center;}
.slot-chip input:checked + label{border-color:var(--gold);color:var(--gold);background:var(--gold-dim);box-shadow:var(--gold-gsm);}
.slot-chip label:hover{border-color:var(--gold-dk);color:var(--gold-dk);}
.slot-chip.disabled label{opacity:0.28;cursor:not-allowed;pointer-events:none;}
.slot-chip.disabled input:checked + label{border-color:var(--danger);color:var(--danger-lt);background:rgba(192,57,43,0.08);box-shadow:none;}
.slot-summary{font-family:'Space Mono',monospace;font-size:0.6rem;color:var(--gold-dk);margin-top:6px;min-height:16px;}

.btn-primary{width:100%;border:none;padding:12px;border-radius:4px;cursor:pointer;margin-top:8px;
  font-family:'Space Mono',monospace;font-size:0.7rem;letter-spacing:0.12em;font-weight:700;transition:all 0.25s;text-transform:uppercase;
  background:linear-gradient(135deg,var(--gold-dk) 0%,var(--gold-lt) 50%,var(--gold-dk) 100%);
  color:#0a0800;background-size:200% 100%;background-position:0%;}
.btn-primary:hover{background-position:100%;box-shadow:var(--gold-glow);transform:translateY(-1px);}
.btn-primary:disabled{opacity:0.4;cursor:not-allowed;transform:none;box-shadow:none;}
.btn-secondary{width:100%;background:transparent;border:1px solid var(--border2);color:var(--text-dim);padding:9px;border-radius:4px;font-family:'Space Mono',monospace;font-size:0.62rem;cursor:pointer;margin-top:5px;transition:all 0.2s;letter-spacing:0.08em;}
.btn-secondary:hover{border-color:var(--gold-dk);color:var(--gold);}
.btn-secondary:disabled{opacity:0.3;cursor:default;}
.btn-danger{width:100%;background:transparent;border:1px solid rgba(192,57,43,0.4);color:var(--danger-lt);padding:9px;border-radius:4px;font-family:'Space Mono',monospace;font-size:0.62rem;cursor:pointer;margin-top:5px;transition:all 0.2s;}
.btn-danger:hover{background:rgba(192,57,43,0.1);border-color:var(--danger-lt);}
.btn-danger:disabled{opacity:0.3;cursor:default;}

/* ── MANAGE ── */
.tabs{display:flex;gap:2px;margin-bottom:18px;border-bottom:1px solid var(--border);}
.tab-btn{background:transparent;border:none;border-bottom:2px solid transparent;color:var(--text-dim);padding:9px 18px;margin-bottom:-1px;font-family:'Space Mono',monospace;font-size:0.62rem;cursor:pointer;transition:all 0.2s;letter-spacing:0.1em;text-transform:uppercase;}
.tab-btn.active{border-bottom-color:var(--gold);color:var(--gold);}
.res-list{display:flex;flex-direction:column;gap:6px;}
.res-item{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:12px 14px;display:flex;align-items:center;gap:12px;transition:border-color 0.2s;}
.res-item:hover{border-color:var(--border2);}
.res-item.no-show-item{border-left:2px solid var(--danger);}
.res-seat-badge{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:700;color:var(--gold);min-width:40px;text-align:center;text-shadow:0 0 8px rgba(201,168,76,0.3);}
.res-info{flex:1;min-width:0;}
.res-name{font-size:0.84rem;font-weight:500;display:flex;align-items:center;gap:6px;}
.res-member-badge{font-family:'Space Mono',monospace;font-size:0.5rem;padding:1px 5px;border-radius:2px;background:var(--gold-dim);color:var(--gold);}
.res-meta{font-family:'Space Mono',monospace;font-size:0.6rem;color:var(--text-dim);margin-top:2px;}
.res-memo-text{font-size:0.64rem;color:var(--gold-dk);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.res-actions{display:flex;gap:4px;flex-shrink:0;}
.action-btn{background:transparent;border:1px solid var(--border2);color:var(--text-dim);padding:4px 9px;border-radius:3px;font-size:0.62rem;cursor:pointer;transition:all 0.2s;font-family:'Space Mono',monospace;text-transform:uppercase;}
.action-btn.check{border-color:rgba(39,174,96,0.4);color:var(--success-lt);}
.action-btn.check:hover{background:rgba(39,174,96,0.1);}
.action-btn.absent{border-color:rgba(192,57,43,0.4);color:var(--danger-lt);}
.action-btn.absent:hover{background:rgba(192,57,43,0.1);}
.res-status-badge{font-family:'Space Mono',monospace;font-size:0.54rem;padding:2px 7px;border-radius:2px;letter-spacing:0.1em;text-transform:uppercase;flex-shrink:0;}
.rsb-pending{background:var(--gold-dim);color:var(--gold);}
.rsb-present{background:rgba(39,174,96,0.12);color:var(--success-lt);}
.rsb-absent{background:rgba(192,57,43,0.12);color:var(--danger-lt);}

/* manage date filter */
.manage-bar{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap;}

.empty-state{text-align:center;padding:48px 20px;color:var(--text-muted);font-size:0.82rem;}
.empty-state .empty-icon{font-size:2rem;margin-bottom:10px;opacity:0.4;}

/* ── TOAST ── */
.toast-container{position:fixed;bottom:24px;right:24px;z-index:999;}
.toast{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:11px 16px;font-size:0.78rem;margin-top:7px;display:flex;align-items:center;gap:10px;animation:slideIn 0.3s ease;box-shadow:0 8px 32px rgba(0,0,0,0.5);max-width:290px;}
.toast.success{border-left:3px solid var(--gold);}
.toast.error{border-left:3px solid var(--danger-lt);}
.toast.warning{border-left:3px solid var(--gold-lt);}
@keyframes slideIn{from{transform:translateX(16px);opacity:0}to{transform:translateX(0);opacity:1}}

/* ── LOADING OVERLAY ── */
.loading-overlay{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.loading-logo{font-family:'Cormorant Garamond',serif;font-size:2rem;letter-spacing:0.3em;
  background:linear-gradient(135deg,var(--gold-dk),var(--gold-lt));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.loading-bar{width:160px;height:1px;background:var(--border2);position:relative;overflow:hidden;}
.loading-bar::after{content:'';position:absolute;left:-100%;top:0;width:100%;height:100%;background:linear-gradient(90deg,transparent,var(--gold),transparent);animation:load 1.2s ease-in-out infinite;}
@keyframes load{to{left:200%;}}

.page{display:none;}
.page.active{display:block;}

@media(max-width:640px){
  .stats-row{grid-template-columns:repeat(2,1fr);}
  .seats-grid{grid-template-columns:repeat(3,1fr);}
  .form-row{grid-template-columns:1fr;}
  .header-time{display:none;}
  .modal{padding:24px 18px 20px;}
}
</style>
<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  window._firebaseModules = { initializeApp, getDatabase, ref, set, onValue, get };
</script>
</head>
<body>

<!-- Loading -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-logo">STUDIUM</div>
  <div class="loading-bar"></div>
  <div style="font-family:'Space Mono',monospace;font-size:0.6rem;color:var(--text-muted);letter-spacing:0.2em;">CONNECTING...</div>
</div>

<header>
  <div class="header-inner">
    <div class="logo-wrap">
      <div class="logo">STUDIUM</div>
      <div class="logo-sub">自習室予約システム</div>
    </div>
    <div class="header-right">
      <div class="sync-indicator">
        <div class="sync-dot" id="syncDot"></div>
        <span id="syncLabel">LIVE</span>
      </div>
      <div class="header-time" id="clockDisplay"></div>

<script>
// ══════════════════════════════════════════
// ★ STEP 1: Firebase の設定をここに貼り付けてください
//   Firebase Console → プロジェクト設定 → マイアプリ → firebaseConfig をコピー
// ══════════════════════════════════════════
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyCf31aMKXdiat9nTmp5n42ydAgMsxv4IzY",
  authDomain:        "studyroom-e8c44.firebaseapp.com",
  databaseURL:       "https://studyroom-e8c44-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "studyroom-e8c44",
  storageBucket:     "studyroom-e8c44.firebasestorage.app",
  messagingSenderId: "80832206351",
  appId:             "1:80832206351:web:bf0b6e8818b93ae2bdf57a"
};
// ★ STEP 2: 会員コードをここで設定してください
const MEMBER_CODES = ['STUDIUM2024', 'GOLD001', 'GOLD002', 'GOLD003'];

const SEAT_COUNT = 12;
const DB_PATH = 'studium/reservations';

let reservations = [];
let selectedSeatId = null;
let infoResId = null;
let currentTab = 'all';
let memberType = 'guest';
let codeVerified = false;
let _dbRef = null; // Firebase DB ref

// ── SLOT DEFINITIONS ──
const SLOTS = ['06:00〜09:00','09:00〜12:00','12:00〜15:00','15:00〜18:00','18:00〜21:00','21:00〜24:00'];

function slotStart(s){ return s.split('〜')[0]; }
function slotEnd(s){ return s.split('〜')[1]; }
function slotsOverlap(a, b){ return !(slotEnd(a) <= slotStart(b) || slotStart(a) >= slotEnd(b)); }

// Check if a slot array overlaps with a filter slot string
function slotsArrOverlap(arr, filterSlot){
  if(!arr || !arr.length) return false;
  return arr.some(s => slotsOverlap(s, filterSlot));
}
// Merge adjacent/consecutive slots into a readable range string
function formatSlots(arr){
  if(!arr || !arr.length) return '';
  if(arr.length === 1) return arr[0];
  // Sort by start time
  const sorted = [...arr].sort((a,b) => slotStart(a) > slotStart(b) ? 1 : -1);
  const first = slotStart(sorted[0]);
  const last  = slotEnd(sorted[sorted.length-1]);
  return `${first}〜${last}（${sorted.length}枠）`;
}

// ── DATE HELPERS ──
function todayStr(){ return new Date().toISOString().split('T')[0]; }
function addDays(dateStr, n){
  const d = new Date(dateStr);
  d.setDate(d.getDate() + n);
  return d.toISOString().split('T')[0];
}
function formatDateJP(dateStr){
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('ja-JP',{month:'numeric',day:'numeric',weekday:'short'});
}

// ══════════════════════════════════════════
// FIREBASE — リアルタイムデータベース
// ══════════════════════════════════════════
function setSyncing(on){
  const dot = document.getElementById('syncDot');
  const label = document.getElementById('syncLabel');
  if(!dot) return;
  if(on){ dot.classList.add('syncing'); label.textContent = 'SYNC'; }
  else { dot.classList.remove('syncing'); label.textContent = 'LIVE'; }
}

async function saveToStorage(){
  if(!_dbRef){ showToast('DB未接続です','error'); return; }
  setSyncing(true);
  try {
    const { set } = window._firebaseModules;
    await set(_dbRef, reservations);
  } catch(e){
    showToast('保存に失敗しました: ' + e.message, 'error');
  }
  setSyncing(false);
}

// ── CLOCK ──
function updateClock(){
  const n = new Date();
  const el = document.getElementById('clockDisplay');
  if(el) el.textContent = n.toLocaleDateString('ja-JP',{month:'2-digit',day:'2-digit',weekday:'short'}) + '  ' + n.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
}
setInterval(updateClock, 1000);

// ── INIT ──
function init(){
  document.getElementById('selectedDate').value = todayStr();
  document.getElementById('manageDate').value = todayStr();
  updateClock();

  // Wait for Firebase modules to load then connect
  function tryConnect(attempts){
    if(window._firebaseModules){
      const { initializeApp, getDatabase, ref, onValue } = window._firebaseModules;
      try {
        const app = initializeApp(FIREBASE_CONFIG);
        const database = getDatabase(app);
        _dbRef = ref(database, DB_PATH);

        // リアルタイム同期：データ変更を自動受信
        onValue(_dbRef, (snapshot) => {
          const data = snapshot.val();
          reservations = Array.isArray(data) ? data : (data ? Object.values(data) : []);
          document.getElementById('loadingOverlay').style.display = 'none';
          setSyncing(false);
          renderAll();
          renderResList();
        }, (error) => {
          showToast('接続エラー: ' + error.message, 'error');
          document.getElementById('loadingOverlay').style.display = 'none';
        });
      } catch(e){
        document.getElementById('loadingOverlay').style.display = 'none';
        showToast('Firebase設定エラー: firebaseConfigを確認してください', 'error');
      }
    } else if(attempts > 0){
      setTimeout(() => tryConnect(attempts - 1), 300);
    } else {
      document.getElementById('loadingOverlay').style.display = 'none';
      showToast('Firebase未設定: ローカルモードで動作', 'warning');
      renderAll(); renderResList();
    }
  }
  tryConnect(15);
}
init();

// ── FILTERS ──
function getFilteredReservations(){
  const date = document.getElementById('selectedDate').value;
  const time = document.getElementById('selectedTime').value;
  return reservations.filter(r => {
    if(r.date !== date) return false;
    if(time !== 'all'){
      const slots = r.slots || (r.slot ? [r.slot] : []);
      return slots.some(s => slotsOverlap(s, time));
    }
    return true;
  });
}

// ── RENDER ──
function renderAll(){ renderStats(); renderSeats(); renderNoShowAlert(); }

function renderStats(){
  const dr = getFilteredReservations();
  const usedSeats = new Set(dr.map(r=>r.seatId));
  const empty = SEAT_COUNT - usedSeats.size;
  const pending = dr.filter(r=>r.status==='pending').length;
  const present = dr.filter(r=>r.status==='present').length;
  const noshow  = dr.filter(r=>r.status==='noshow').length;
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card s-open"><div class="stat-num gold">${empty}</div><div class="stat-label">空席</div></div>
    <div class="stat-card s-rsv"><div class="stat-num purple">${pending}</div><div class="stat-label">予約済</div></div>
    <div class="stat-card s-ok"><div class="stat-num green">${present}</div><div class="stat-label">来塾中</div></div>
    <div class="stat-card s-ng"><div class="stat-num red">${noshow}</div><div class="stat-label">無断欠席</div></div>`;
}

function renderNoShowAlert(){
  const ns = getFilteredReservations().filter(r=>r.status==='noshow');
  document.getElementById('noShowAlert').innerHTML = ns.length
    ? `<div class="noshow-alert">⚠ <strong style="color:var(--danger-lt)">${ns.length}件</strong> の無断欠席があります</div>` : '';
}

function renderSeats(){
  const date = document.getElementById('selectedDate').value;
  const timeFilter = document.getElementById('selectedTime').value;
  const grid = document.getElementById('seatsGrid');
  grid.innerHTML = '';

  for(let i = 1; i <= SEAT_COUNT; i++){
    // All active reservations for this seat/date
    const allSeatRes = reservations.filter(r => r.seatId === i && r.date === date && r.status !== 'noshow');

    // Reservations that overlap the current time filter
    const filteredRes = timeFilter === 'all'
      ? allSeatRes
      : allSeatRes.filter(r => {
          const slots = r.slots || (r.slot ? [r.slot] : []);
          return slots.some(s => slotsOverlap(s, timeFilter));
        });

    // Is the filtered time slot fully taken?
    const isTakenInFilter = filteredRes.length > 0;

    // Are ALL 6 slots taken? (fully booked seat)
    const takenSlots = new Set();
    allSeatRes.forEach(r => {
      (r.slots || (r.slot ? [r.slot] : [])).forEach(s => takenSlots.add(s));
    });
    const isFullyBooked = SLOTS.every(s => takenSlots.has(s));

    let cls, icon, nameEl, timeEl, memoEl = '', badge;

    if(!isTakenInFilter){
      // Free in the selected time window → always allow booking
      cls = 'empty'; icon = '◇';
      nameEl = `<span style="color:var(--text-muted)">空き</span>`;
      timeEl = allSeatRes.length > 0 ? `他${allSeatRes.length}件の予約あり` : '';
      badge = 'OPEN';
      if(allSeatRes.length > 0){
        // Show partial indicator
        icon = '◈';
        nameEl = `<span style="color:var(--gold-dk);font-size:0.72rem;">一部空き</span>`;
      }
    } else {
      // Taken in the current filter — show the most recent reservation for this slot
      const latest = filteredRes.sort((a,b) => b.id - a.id)[0];
      const slots = latest.slots || (latest.slot ? [latest.slot] : []);
      const memberMark = latest.isMember ? ' ★' : '';
      const slotDisplay = formatSlots(slots);
      memoEl = latest.memo || '';

      if(latest.status === 'noshow'){
        cls = 'no-show'; icon = '✕'; nameEl = latest.name + memberMark; timeEl = slotDisplay; badge = 'NO SHOW';
      } else if(latest.status === 'present'){
        cls = 'present-seat'; icon = '✓'; nameEl = latest.name + memberMark; timeEl = slotDisplay; badge = 'IN USE';
      } else {
        cls = 'reserved'; icon = '◆'; nameEl = latest.name + memberMark; timeEl = slotDisplay; badge = 'RSVD';
      }
    }

    const c = document.createElement('div');
    c.className = `seat-card ${cls}${(!isTakenInFilter && allSeatRes.length > 0) ? ' partial' : ''}`;
    c.innerHTML = `
      <div class="seat-num">SEAT ${String(i).padStart(2,'0')}</div>
      <span class="seat-icon">${icon}</span>
      <div class="seat-name">${nameEl}</div>
      <div class="seat-time">${timeEl}</div>
      ${memoEl ? `<div class="seat-memo">〜 ${memoEl}</div>` : ''}
      <div class="seat-badge">${badge}</div>`;

    if(!isTakenInFilter){
      // Empty or partial — open reservation modal
      c.onclick = () => openReserveModal(i);
    } else {
      // Show info for the reservation in this slot
      const latest = filteredRes.sort((a,b) => b.id - a.id)[0];
      c.onclick = () => openInfoModal(latest);
    }

    grid.appendChild(c);
  }
}

// ── MODAL: RESERVE ──
function buildSlotChips(seatId, date){
  const grid = document.getElementById('slotGrid');
  grid.innerHTML = '';
  SLOTS.forEach((slot, idx) => {
    // Check if this slot is already taken for this seat/date
    const taken = reservations.some(r => {
      if(r.seatId !== seatId || r.date !== date || r.status === 'noshow') return false;
      const slots = r.slots || (r.slot ? [r.slot] : []);
      return slots.some(s => slotsOverlap(s, slot));
    });
    const chip = document.createElement('div');
    chip.className = 'slot-chip' + (taken ? ' disabled' : '');
    chip.innerHTML = `
      <input type="checkbox" id="slot_${idx}" value="${slot}" ${taken ? 'disabled' : ''} onchange="updateSlotSummary()">
      <label for="slot_${idx}">${slot}${taken ? '<br><span style="font-size:0.5rem;color:var(--danger-lt);">満席</span>' : ''}</label>`;
    grid.appendChild(chip);
  });
  updateSlotSummary();
}

function updateSlotSummary(){
  const selected = getSelectedSlots();
  const summary = document.getElementById('slotSummary');
  if(!selected.length){
    summary.textContent = 'スロットを選択してください';
    summary.style.color = 'var(--text-muted)';
  } else {
    summary.textContent = '◆ ' + formatSlots(selected);
    summary.style.color = 'var(--gold)';
  }
}

function getSelectedSlots(){
  const checks = document.querySelectorAll('#slotGrid input[type=checkbox]:checked');
  return Array.from(checks).map(c => c.value);
}

function openReserveModal(seatId){
  selectedSeatId = seatId;
  document.getElementById('modalSeatNum').textContent = String(seatId).padStart(2,'0');
  document.getElementById('inputName').value = '';
  document.getElementById('inputMemo').value = '';
  document.getElementById('inputCode').value = '';
  document.getElementById('codeStatus').textContent = '';
  codeVerified = false;
  memberType = 'guest';

  const today = todayStr();
  document.getElementById('inputDate').value = today;
  document.getElementById('inputDate').min = today;
  document.getElementById('inputDate').max = today;

  selectMemberType('guest');

  // Pre-select the currently viewed time slot if any
  const selTime = document.getElementById('selectedTime').value;
  buildSlotChips(seatId, today);
  if(selTime !== 'all'){
    const matchEl = document.querySelector(`#slotGrid input[value="${selTime}"]`);
    if(matchEl && !matchEl.disabled){ matchEl.checked = true; updateSlotSummary(); }
  }

  openModal('reserveModal');
}

function selectMemberType(type){
  memberType = type;
  const today = todayStr();
  document.getElementById('btnGuest').classList.toggle('active', type==='guest');
  document.getElementById('btnMember').classList.toggle('active', type==='member');
  document.getElementById('codeGroup').style.display = type==='member' ? 'block' : 'none';

  if(type === 'guest'){
    document.getElementById('inputDate').min = today;
    document.getElementById('inputDate').max = today;
    document.getElementById('inputDate').value = today;
    document.getElementById('memberInfo').textContent = '一般予約：本日のみ予約可能';
    document.getElementById('memberInfo').className = 'member-info';
    document.getElementById('dateRangeHint').textContent = '（本日のみ）';
    codeVerified = false;
  } else {
    document.getElementById('memberInfo').textContent = '★ 会員コードを入力すると1週間先まで予約できます';
    document.getElementById('memberInfo').className = 'member-info gold-info';
    document.getElementById('dateRangeHint').textContent = '';
    document.getElementById('inputDate').min = today;
    document.getElementById('inputDate').max = today; // will unlock after code
  }
  // Rebuild chips for the selected date
  const date = document.getElementById('inputDate').value || today;
  buildSlotChips(selectedSeatId, date);
}

// Rebuild chips when date changes in modal
function onModalDateChange(){
  const date = document.getElementById('inputDate').value;
  if(date) buildSlotChips(selectedSeatId, date);
}

function validateCode(){
  const code = document.getElementById('inputCode').value.trim().toUpperCase();
  const statusEl = document.getElementById('codeStatus');
  const dateInput = document.getElementById('inputDate');
  const today = todayStr();
  if(MEMBER_CODES.includes(code)){
    codeVerified = true;
    statusEl.textContent = '✓ 認証OK — 1週間先まで予約可能';
    statusEl.style.color = 'var(--success-lt)';
    dateInput.max = addDays(today, 7);
    document.getElementById('dateRangeHint').textContent = `（〜 ${formatDateJP(addDays(today,7))}）`;
  } else {
    codeVerified = false;
    statusEl.textContent = code.length > 0 ? '✕ コードが正しくありません' : '';
    statusEl.style.color = 'var(--danger-lt)';
    dateInput.max = today;
    document.getElementById('dateRangeHint').textContent = '';
  }
}

async function confirmReservation(){
  const name = document.getElementById('inputName').value.trim();
  const slots = getSelectedSlots();
  const date = document.getElementById('inputDate').value;
  const memo = document.getElementById('inputMemo').value.trim();
  const today = todayStr();

  if(!name){ showToast('氏名を入力してください','error'); return; }
  if(!slots.length){ showToast('時間スロットを選択してください','error'); return; }
  if(!date){ showToast('予約日を選択してください','error'); return; }
  if(memberType === 'member' && !codeVerified){ showToast('有効な会員コードを入力してください','error'); return; }
  if(memberType === 'guest' && date !== today){ showToast('一般予約は本日のみです','error'); return; }
  if(memberType === 'member' && date > addDays(today, 7)){ showToast('予約は1週間先までです','error'); return; }

  // Conflict check: each selected slot must be free
  const takenSlot = slots.find(slot =>
    reservations.some(r =>
      r.seatId === selectedSeatId && r.date === date && r.status !== 'noshow' &&
      (r.slots || (r.slot ? [r.slot] : [])).some(s => slotsOverlap(s, slot))
    )
  );
  if(takenSlot){ showToast(`${takenSlot} は既に予約済です`,'error'); return; }

  const res = {
    id: Date.now(),
    seatId: selectedSeatId,
    name, date, slots, memo,
    isMember: memberType === 'member',
    status: 'pending',
    createdAt: new Date().toISOString()
  };
  reservations.push(res);
  await saveToStorage();
  closeModal('reserveModal');
  renderAll();
  renderResList();
  showToast(`Seat ${String(selectedSeatId).padStart(2,'0')} を予約しました（${slots.length}枠）`,'success');
}

// ── MODAL: INFO ──
function openInfoModal(res){
  infoResId = res.id;
  document.getElementById('infoSeatNum').textContent = String(res.seatId).padStart(2,'0');
  const sMap = {pending:'Pending',present:'In Use',noshow:'No Show'};
  const cMap = {pending:'var(--gold)',present:'var(--success-lt)',noshow:'var(--danger-lt)'};
  document.getElementById('infoModalTitle').innerHTML = `<span style="color:${cMap[res.status]}">${sMap[res.status]}</span>`;
  const slots = res.slots || (res.slot ? [res.slot] : []);
  const slotLines = slots.map(s=>`<div style="margin-bottom:2px;">▸ ${s}</div>`).join('');
  document.getElementById('infoContent').innerHTML = `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:13px 15px;margin-bottom:14px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
        <div style="font-size:0.95rem;font-weight:600;">${res.name}</div>
        ${res.isMember ? `<span style="font-family:'Space Mono',monospace;font-size:0.5rem;padding:1px 6px;border-radius:2px;background:var(--gold-dim);color:var(--gold);">会員</span>` : ''}
      </div>
      <div style="font-family:'Space Mono',monospace;font-size:0.62rem;color:var(--text-dim);margin-bottom:6px;">
        ${formatDateJP(res.date)}
      </div>
      <div style="font-family:'Space Mono',monospace;font-size:0.62rem;color:var(--text-dim);">${slotLines}</div>
      ${res.memo ? `<div style="font-size:0.7rem;color:var(--gold-dk);margin-top:8px;border-top:1px solid var(--border);padding-top:6px;">〜 ${res.memo}</div>` : ''}
    </div>`;
  const ok = res.status === 'pending';
  document.getElementById('btnPresent').disabled = !ok;
  document.getElementById('btnAbsent').disabled = !ok;
  document.getElementById('btnCancel').disabled = res.status === 'present';
  openModal('infoModal');
}

async function markPresent(){
  await setStatus(infoResId, 'present');
  closeModal('infoModal');
  showToast('来塾を確認しました','success');
}
async function markAbsent(){
  await setStatus(infoResId, 'noshow');
  closeModal('infoModal');
  showToast('無断欠席としてマークしました','warning');
}
async function cancelReservation(){
  reservations = reservations.filter(r => r.id !== infoResId);
  await saveToStorage();
  closeModal('infoModal');
  renderAll(); renderResList();
  showToast('予約をキャンセルしました','error');
}
async function setStatus(id, status){
  const r = reservations.find(r => r.id === id);
  if(r){ r.status = status; await saveToStorage(); }
  renderAll(); renderResList();
}

// ── MANAGE ──
function switchTab(tab){
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active',['all','today','noshow','member'][i]===tab));
  renderResList();
}

function renderResList(){
  const today = todayStr();
  const manageDateVal = document.getElementById('manageDate') ? document.getElementById('manageDate').value : '';
  let f = [...reservations].sort((a,b) => {
    if(a.date !== b.date) return a.date > b.date ? 1 : -1;
    return b.id - a.id;
  });
  if(manageDateVal) f = f.filter(r => r.date === manageDateVal);
  if(currentTab === 'today') f = f.filter(r => r.date === today);
  if(currentTab === 'noshow') f = f.filter(r => r.status === 'noshow');
  if(currentTab === 'member') f = f.filter(r => r.isMember);

  const c = document.getElementById('resList');
  if(!c) return;
  if(!f.length){ c.innerHTML = `<div class="empty-state"><div class="empty-icon">◇</div>該当する予約はありません</div>`; return; }
  const sm = {pending:'PENDING',present:'PRESENT',noshow:'NO SHOW'};
  const sc = {pending:'rsb-pending',present:'rsb-present',noshow:'rsb-absent'};
  c.innerHTML = `<div class="res-list">${f.map(r=>`
    <div class="res-item ${r.status==='noshow'?'no-show-item':''}">
      <div class="res-seat-badge">S${String(r.seatId).padStart(2,'0')}</div>
      <div class="res-info">
        <div class="res-name">${r.name}${r.isMember?`<span class="res-member-badge">会員</span>`:''}</div>
        <div class="res-meta">${formatDateJP(r.date)} &nbsp; ${formatSlots(r.slots || (r.slot ? [r.slot] : []))}</div>
        ${r.memo?`<div class="res-memo-text">〜 ${r.memo}</div>`:''}
      </div>
      <span class="res-status-badge ${sc[r.status]}">${sm[r.status]}</span>
      <div class="res-actions">
        ${r.status==='pending'?`<button class="action-btn check" onclick="qStatus(${r.id},'present')">来塾</button><button class="action-btn absent" onclick="qStatus(${r.id},'noshow')">欠席</button>`:''}
        ${r.status!=='present'?`<button class="action-btn" onclick="delRes(${r.id})" style="font-size:0.55rem;">削除</button>`:''}
      </div>
    </div>`).join('')}</div>`;
}

async function qStatus(id, status){
  await setStatus(id, status);
  showToast(status==='present'?'来塾を確認しました':'無断欠席としてマークしました', status==='present'?'success':'warning');
}
async function delRes(id){
  reservations = reservations.filter(r => r.id !== id);
  await saveToStorage(); renderResList(); renderAll();
  showToast('削除しました','error');
}

// ── MODAL UTILS ──
function openModal(id){ document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if(e.target===el) el.classList.remove('open'); });
});

function showPage(id, e){
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if(e&&e.target) e.target.classList.add('active');
  if(id==='manage') renderResList();
}

function showToast(msg, type='success'){
  const icons = {success:'◆',error:'✕',warning:'⚠'};
  const colors = {success:'var(--gold)',error:'var(--danger-lt)',warning:'var(--gold-lt)'};
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<span style="color:${colors[type]}">${icons[type]}</span><span>${msg}</span>`;
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(()=>t.remove(), 3200);
}
</script>
</body>
